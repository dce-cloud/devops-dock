volumes:
  mysql-data:
    driver: ${VOLUMES_DRIVER}
  mysql80-data:
    driver: ${VOLUMES_DRIVER}

secrets:
  mysql_root_password:
    file: ${MYSQL_HOST_PATH}/mysql_root_password
  mysql_password:
    file: ${MYSQL_HOST_PATH}/mysql_password 
  mysql80_root_password:
    file: ${MYSQL80_HOST_PATH}/mysql_root_password
  mysql80_password:
    file: ${MYSQL80_HOST_PATH}/mysql_password 

x-mysql8-healthcheck: &mysql8-healthcheck
    test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p$(cat /run/secrets/mysql_root_password)']
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 10s
    
services:

### Mysql ################################################
  mysql:
    build:
      context: ${MYSQL_HOST_PATH}
      args:
        DOCKER_REGISTRY_URL: ${DOCKER_REGISTRY_URL}
        MYSQL_VERSION: ${MYSQL_VERSION}
    hostname: ${MYSQL_HOSTNAME}
    container_name: ${MYSQL_CONTAINER_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    volumes:
      - "mysql-data:/var/lib/mysql"
      - "${MYSQL_HOST_PATH}/conf:/etc/mysql/conf.d"
      - "${MYSQL_HOST_PATH}/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d"
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    environment:
      TZ: "${TZ}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_INITDB_SKIP_TZINFO: "1"
    secrets:
      - source: mysql_root_password
        target: mysql_root_password
      - source: mysql_password
        target: mysql_password
    networks:
      backend:
        ipv4_address: ${MYSQL_BACKEND_IP}
    healthcheck: *mysql8-healthcheck

### Mysql 80 ################################################
  mysql80:
    build:
      context: ${MYSQL80_HOST_PATH}
      args:
        DOCKER_REGISTRY_URL: ${DOCKER_REGISTRY_URL}
        MYSQL_VERSION: ${MYSQL80_VERSION}
    hostname: ${MYSQL80_HOSTNAME}
    container_name: ${MYSQL80_CONTAINER_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    volumes:
      - "mysql80-data:/var/lib/mysql"
      - "${MYSQL80_HOST_PATH}/conf:/etc/mysql/conf.d"
      - "${MYSQL80_HOST_PATH}/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d"
    ports:
      - "${MYSQL80_HOST_PORT}:3306"
    environment:
      TZ: "${TZ}"
      MYSQL_DATABASE: "${MYSQL80_DATABASE}"
      MYSQL_USER: "${MYSQL80_USER}"
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_INITDB_SKIP_TZINFO: "1"
    secrets:
      - source: mysql80_root_password
        target: mysql_root_password          
      - source: mysql80_password
        target: mysql_password
    networks:
      backend:
        ipv4_address: ${MYSQL80_BACKEND_IP}
    healthcheck: *mysql8-healthcheck
